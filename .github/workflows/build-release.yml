name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Bump version
      id: bump_version
      run: uv run python .github/scripts/bump_version.py "${{ github.event.inputs.version_bump }}"

    # Generate resources/icon.ico from the PNG before Nuitka runs.
    - name: Generate Windows icon
      run: uv run python -c "from pathlib import Path; from build import _make_ico; _make_ico(Path('resources/icon.png'), Path('resources/icon.ico'))"

    - name: Build standalone executable (Nuitka)
      shell: pwsh
      run: |
        uv run python -m nuitka `
          --standalone `
          --assume-yes-for-downloads `
          --lto=no `
          --output-dir=build `
          --output-filename=grammar-ai.exe `
          --enable-plugin=tk-inter `
          --include-data-files=pyproject.toml=pyproject.toml `
          --include-data-files=resources/icon.png=resources/icon.png `
          --windows-icon-from-ico=resources/icon.ico `
          --windows-console-mode=disable `
          main.py

    - name: Build installer (Inno Setup)
      shell: pwsh
      run: |
        $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
        & $iscc /DAppVersion="${{ steps.bump_version.outputs.new_version }}" installer.iss
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    # Commit and tag only after both build steps succeed.
    # This keeps the repo clean: a failed build leaves no orphaned version bump.
    - name: Commit and tag version bump
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add pyproject.toml
        git commit -m "Bump version to ${{ steps.bump_version.outputs.new_version }}"
        git tag "v${{ steps.bump_version.outputs.new_version }}"
        git push origin HEAD:${{ github.ref_name }}
        git push origin "v${{ steps.bump_version.outputs.new_version }}"

    - name: Generate release notes
      id: release_notes
      run: uv run python .github/scripts/generate_release_notes.py --new-version "${{ steps.bump_version.outputs.new_version }}"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.bump_version.outputs.new_version }}
        name: Release v${{ steps.bump_version.outputs.new_version }}
        body: ${{ steps.release_notes.outputs.notes }}
        files: ./dist/grammar-ai-installer-windows-x64-v${{ steps.bump_version.outputs.new_version }}.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
