name: Lint

on:
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run linter
      run: uv run python lint.py